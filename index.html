<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Webcam Scanner Test</title>
    <style>
        /* จัดหน้าจอให้ดูง่าย */
        video { width: 100%; max-width: 500px; border: 2px solid #333; border-radius: 8px; }
        .container { display: flex; flex-direction: column; align-items: center; gap: 15px; margin-top: 50px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h2>เครื่องมือเปิดกล้องสแกนบัตร/ป้ายทะเบียน</h2>
    
    <video id="webcam" autoplay playsinline></video>
    
    <button id="start-btn">เปิดกล้อง</button>
    <button id="capture-btn" style="display:none;">ถ่ายรูป (Snap)</button>
    
    <canvas id="canvas" style="display:none;"></canvas>
    <img id="photo" alt="รูปที่ถ่ายจะปรากฏที่นี่" style="max-width: 500px; margin-top: 10px;">
</div>

<script>
    const video = document.getElementById('webcam');
    const startBtn = document.getElementById('start-btn');
    const captureBtn = document.getElementById('capture-btn');
    const canvas = document.getElementById('canvas');
    const photo = document.getElementById('photo');

    // ฟังก์ชันขออนุญาตเข้าถึงกล้อง
    async function startCamera() {
        try {
            // เลือกใช้กล้องหลัง (environment) สำหรับสแกนบัตร/ป้ายทะเบียน
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment" }, 
                audio: false 
            });
            video.srcObject = stream;
            startBtn.style.display = 'none';
            captureBtn.style.display = 'inline-block';
        } catch (err) {
            console.error("Error accessing camera: ", err);
            alert("ไม่สามารถเปิดกล้องได้ กรุณาเช็คการอนุญาต (Permissions)");
        }
    }

    // ฟังก์ชันถ่ายรูป (Capture) เพื่อเตรียมส่งไป OCR
    captureBtn.addEventListener('click', () => {
        const context = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        
        // วาดภาพจากวิดีโอลงใน Canvas
        context.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        // แปลงภาพเป็น Base64 เพื่อนำไปใช้งานต่อ (ส่งเข้า AI API)
        const data = canvas.toDataURL('image/png');
        photo.setAttribute('src', data);
        console.log("Captured Image Data:", data);
    });

    startBtn.addEventListener('click', startCamera);
</script>

</body>
</html>
