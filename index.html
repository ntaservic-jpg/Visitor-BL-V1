<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ระบบบันทึกข้อมูลผู้ติดต่อ (Full Version)</title>
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
  
  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <style>
    :root { --primary-color: #0d6efd; --dark-color: #212529; }
    body { font-family: 'Sarabun', sans-serif; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); min-height: 100vh; padding-bottom: 50px; }
    .glass-card { background: rgba(255, 255, 255, 0.95); border-radius: 20px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1); margin-bottom: 20px; }
    
    .preview-box { width: 100%; aspect-ratio: 1 / 1; border: 2px dashed #ccc; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; position: relative; transition: all 0.3s ease; background: #fff; }
    .preview-box.has-image { border-style: solid; border-color: #28a745; }
    .preview-box img { width: 100%; height: 100%; object-fit: cover; }
    .preview-label-overlay { position: absolute; bottom: 0; width: 100%; background: rgba(0, 0, 0, 0.6); color: white; font-size: 10px; padding: 2px 0; text-align: center; }

    /* Camera Overlay System */
    .camera-container { position: relative; overflow: hidden; background: #000; }
    .camera-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; z-index: 10; }
    .guide-card { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; height: 35%; border: 3px solid #ffc107; border-radius: 15px; box-shadow: 0 0 0 1000px rgba(0, 0, 0, 0.5); }
    .guide-plate { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; height: 35%; border: 3px solid #0d6efd; box-shadow: 0 0 0 1000px rgba(0, 0, 0, 0.5); }

    .loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.9); z-index: 9999; flex-direction: column; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
  </style>
</head>

<body>
  <div class="loading-overlay" id="loader">
    <div class="spinner-grow text-primary" style="width: 3rem; height: 3rem;"></div>
    <div class="mt-3 fw-bold text-primary">ระบบกำลังประมวลผล AI...</div>
  </div>

  <div class="container py-4" style="max-width: 700px;">
    <div class="text-center mb-4">
      <i class="fa-solid fa-shield-halved fa-3x text-primary mb-2"></i>
      <h2 class="fw-bold">ระบบบันทึกผู้ติดต่อ</h2>
      <div id="vst_display" class="badge bg-primary fs-5 px-4 rounded-pill">VST-LOADING</div>
    </div>

    <div class="card glass-card border-0">
      <div class="card-body p-3 text-center">
        <div class="row g-2">
          <div class="col-4">
            <div class="preview-box" id="box-person" onclick="openCaptureModal('person')">
              <i class="fa-solid fa-user-camera fa-2x text-muted"></i>
              <span class="small mt-1 text-muted">รูปคน</span>
            </div>
          </div>
          <div class="col-4">
            <div class="preview-box" id="box-card" onclick="openCaptureModal('card')">
              <i class="fa-solid fa-id-card fa-2x text-muted"></i>
              <span class="small mt-1 text-muted">สแกนบัตร</span>
            </div>
          </div>
          <div class="col-4">
            <div class="preview-box" id="box-plate" onclick="openCaptureModal('plate')">
              <i class="fa-solid fa-car-side fa-2x text-muted"></i>
              <span class="small mt-1 text-muted">ทะเบียน</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="card glass-card border-0 px-3 py-4">
      <h5 class="fw-bold text-primary mb-3"><i class="fa-solid fa-pen-to-square me-2"></i>บันทึกข้อมูล</h5>
      <input type="hidden" id="vst_id">
      
      <div class="p-3 rounded-3 mb-3" style="background-color: #fff5f5; border-left: 5px solid #dc3545;">
        <small class="fw-bold text-danger d-block mb-2"><i class="fa-solid fa-user me-1"></i> ส่วนที่ 1: ข้อมูลบุคคล (เพิ่มทีละคน)</small>
        <div class="row g-2">
          <div class="col-md-6">
            <label class="form-label small fw-bold">เลขบัตรประชาชน</label>
            <input type="text" id="id_card" class="form-control" placeholder="รอสแกนบัตร...">
          </div>
          <div class="col-md-6">
            <label class="form-label small fw-bold">ชื่อ-นามสกุล</label>
            <input type="text" id="full_name" class="form-control" placeholder="รอสแกนชื่อ...">
          </div>
          <div class="col-12">
            <label class="form-label small fw-bold text-danger">บาร์โค้ดบัตรติดคน</label>
            <div class="input-group">
              <input type="text" id="badge_id" class="form-control border-danger" placeholder="สแกนบาร์โค้ดคน...">
              <button class="btn btn-danger" onclick="startBarcodeScanner('badge_id')"><i class="fa-solid fa-barcode"></i></button>
            </div>
          </div>
        </div>
      </div>

      <div class="p-3 rounded-3" style="background-color: #f0f7ff; border-left: 5px solid #0d6efd;">
        <small class="fw-bold text-primary d-block mb-2"><i class="fa-solid fa-car me-1"></i> ส่วนที่ 2: ข้อมูลการติดต่อและพาหนะ</small>
        <div class="row g-2">
          <div class="col-12 mb-2">
            <label class="form-label small fw-bold">พื้นที่ติดต่อ</label>
            <div class="d-flex gap-2">
              <input type="radio" class="btn-check" name="contact_area" id="area_normal" value="พื้นที่ธรรมดา" checked>
              <label class="btn btn-outline-primary w-100 btn-sm" for="area_normal">พื้นที่ธรรมดา</label>
              <input type="radio" class="btn-check" name="contact_area" id="area_red" value="พื้นที่สีแดง">
              <label class="btn btn-outline-danger w-100 btn-sm" for="area_red">พื้นที่สีแดง</label>
            </div>
          </div>

          <div class="col-12 mb-2">
            <label class="form-label small fw-bold">ติดต่อเรื่อง</label>
            <div class="input-group">
              <input type="text" id="contact_topic" class="form-control" placeholder="ระบุเรื่องที่ติดต่อ...">
              <button class="btn btn-primary" onclick="startVoiceRecognition('contact_topic')"><i class="fa-solid fa-microphone"></i></button>
            </div>
          </div>

          <div class="col-12 mb-2">
            <label class="form-label small fw-bold">ติดต่อใคร/แผนก</label>
            <div class="input-group">
              <input type="text" id="contact_person" class="form-control" placeholder="ระบุชื่อผู้ติดต่อ...">
              <button class="btn btn-primary" onclick="startVoiceRecognition('contact_person')"><i class="fa-solid fa-microphone"></i></button>
            </div>
          </div>

          <hr class="my-2 opacity-25">

          <div class="col-6">
            <label class="form-label small fw-bold">ทะเบียนรถ</label>
            <input type="text" id="car_plate" class="form-control" placeholder="รอสแกน...">
          </div>
          <div class="col-6">
            <label class="form-label small fw-bold">จังหวัด</label>
            <input type="text" id="province" class="form-control" placeholder="ระบุจังหวัด...">
          </div>
          
          <div class="col-12 mt-2">
            <label class="form-label small fw-bold text-primary">บาร์โค้ดบัตรติดรถ</label>
            <div class="input-group">
              <input type="text" id="barcode_car" class="form-control border-primary" placeholder="สแกนบาร์โค้ดรถ...">
              <button class="btn btn-primary" onclick="startBarcodeScanner('barcode_car')"><i class="fa-solid fa-barcode"></i></button>
            </div>
          </div>
        </div>
      </div>

      <button class="btn btn-warning w-100 mt-4 py-3 fw-bold shadow-sm" onclick="addMemberToList()">
        <i class="fa-solid fa-user-plus me-2"></i>เพิ่มเข้ารายการกลุ่ม
      </button>
    </div>

    <div class="card glass-card border-0 overflow-hidden">
      <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
        <span class="fw-bold small">รายชื่อรอนำเข้า</span>
        <span id="member-count" class="badge bg-primary">0 คน</span>
      </div>
      <div class="table-responsive">
        <table class="table table-hover mb-0">
          <tbody id="memberList" class="small"></tbody>
        </table>
      </div>
    </div>

    <button class="btn btn-primary btn-lg w-100 py-3 shadow" onclick="saveAllToSheet()">
      <i class="fa-solid fa-cloud-arrow-up me-2"></i>บันทึกข้อมูลทั้งหมด
    </button>
  </div>

  <div class="modal fade" id="cameraModal" data-bs-backdrop="static" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content border-0 shadow-lg" style="border-radius: 20px; overflow: hidden;">
        <div class="modal-header bg-dark text-white border-0">
          <h6 class="modal-title fw-bold" id="cameraModalTitle">ถ่ายรูป</h6>
          <button type="button" class="btn-close btn-close-white" onclick="closeCameraModal()"></button>
        </div>
        <div class="modal-body p-0 camera-container">
          <video id="video" autoplay playsinline style="width: 100%; display: block;"></video>
          <div id="camera-overlay" class="camera-overlay">
            <div id="guide-box"></div>
          </div>
          <button class="btn btn-light btn-sm position-absolute top-0 end-0 m-2 rounded-circle shadow-sm" onclick="switchCamera()" style="z-index: 20;">
            <i class="fa-solid fa-camera-rotate"></i>
          </button>
        </div>
        <div class="modal-footer bg-light border-0">
          <button type="button" class="btn btn-primary w-100 py-2 fw-bold" id="captureBtn">
            <i class="fa-solid fa-camera me-2"></i>กดถ่ายรูป
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="barcodeModal" data-bs-backdrop="static" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content border-0 shadow-lg" style="border-radius: 20px; overflow: hidden;">
        <div class="modal-header bg-dark text-white border-0">
          <h6 class="modal-title fw-bold"><i class="fa-solid fa-barcode me-2"></i>สแกนบาร์โค้ด</h6>
          <button type="button" class="btn-close btn-close-white" onclick="stopBarcodeScanner()"></button>
        </div>
        <div class="modal-body p-0 bg-black"><div id="reader" style="width: 100%;"></div></div>
      </div>
    </div>
  </div>

  <canvas id="canvas" style="display:none;"></canvas>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxstMFzsppnX48byTNHMMq6x1HHzkUax5Xb0_jT-M9LhdjwQkfLuIpmQd4GldTNgTLZkQ/exec"; 
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const loader = document.getElementById('loader');
    let tempMembers = [];
    let currentStream = null;
    let facingMode = "environment";
    let cameraModalInstance;
    let html5QrCode;

    // --- Camera & Capture ---
    async function startCamera() {
      if (currentStream) currentStream.getTracks().forEach(t => t.stop());
      try {
        currentStream = await navigator.mediaDevices.getUserMedia({ 
          video: { facingMode: facingMode, width: { ideal: 1280 }, height: { ideal: 720 } } 
        });
        video.srcObject = currentStream;
      } catch (err) { Swal.fire('Error', 'ไม่สามารถเข้าถึงกล้องได้', 'error'); }
    }

    function openCaptureModal(type) {
      const titles = { 'person': 'ถ่ายรูปบุคคล', 'card': 'สแกนบัตรประชาชน', 'plate': 'สแกนป้ายทะเบียน' };
      document.getElementById('cameraModalTitle').innerText = titles[type];
      
      const overlay = document.getElementById('camera-overlay');
      const guideBox = document.getElementById('guide-box');
      
      if (type === 'card') {
        overlay.style.display = 'block';
        guideBox.className = 'guide-card';
      } else if (type === 'plate') {
        overlay.style.display = 'block';
        guideBox.className = 'guide-plate';
      } else {
        overlay.style.display = 'none';
      }

      document.getElementById('captureBtn').onclick = () => capture(type);
      if (!cameraModalInstance) cameraModalInstance = new bootstrap.Modal(document.getElementById('cameraModal'));
      cameraModalInstance.show();
      startCamera();
    }

    function closeCameraModal() {
      if (cameraModalInstance) cameraModalInstance.hide();
      if (currentStream) currentStream.getTracks().forEach(track => track.stop());
    }

    async function switchCamera() {
      facingMode = (facingMode === "user") ? "environment" : "user";
      await startCamera();
    }

    // คัดลอกเฉพาะฟังก์ชัน capture นี้ไปวางทับของเดิมในไฟล์ HTML ครับ
async function capture(type) {
    const ctx = canvas.getContext('2d');
    
    // 1. ใช้ขนาดจริงจากกล้อง (ช่วยให้ตัวหนังสือคมชัด ไม่แตก)
    const vWidth = video.videoWidth;
    const vHeight = video.videoHeight;

    // 2. ตั้งค่า Canvas ตามขนาดจริง
    canvas.width = vWidth;
    canvas.height = vHeight;

    if (type === 'plate') {
        // สำหรับทะเบียนรถ Crop เฉพาะช่วงกลางเพื่อให้ AI โฟกัสถูกจุด
        const cropW = vWidth * 0.9;
        const cropH = vHeight * 0.4;
        const startX = (vWidth - cropW) / 2;
        const startY = (vHeight - cropH) / 2;
        
        canvas.width = cropW;
        canvas.height = cropH;
        ctx.drawImage(video, startX, startY, cropW, cropH, 0, 0, cropW, cropH);
    } else {
        // สำหรับรูปคนและบัตรประชาชน ถ่ายแบบเต็มเฟรม
        ctx.drawImage(video, 0, 0, vWidth, vHeight);
    }

    // 3. บีบอัดไฟล์เหลือ 0.5 (สำคัญมาก!) 
    // เพื่อให้ส่งค่า Base64 ไปยัง Google Script ได้โดยที่ข้อมูลไม่ขาดระหว่างทาง
    const base64 = canvas.toDataURL('image/jpeg', 0.5); 
    
    const box = document.getElementById('box-' + type);
    box.classList.add('has-image');
    // เพิ่ม id="img-src-${type}" เพื่อให้ฟังก์ชัน addMemberToList ดึงรูปไปใช้ได้
    box.innerHTML = `<img src="${base64}" id="img-src-${type}"><div class="preview-label-overlay">${type === 'person' ? 'รูปคน' : (type === 'card' ? 'บัตร' : 'ทะเบียน')}</div>`;

    closeCameraModal();

    // 4. ส่งไปประมวลผล AI
    if (type === 'card' || type === 'plate') {
        loader.style.display = 'flex';
        try {
            // ปรับ Timeout หรือจัดการ Error กรณีเน็ตช้าจากการส่งภาพใหญ่
            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'ocr', image: base64, type: type })
            });
            const res = await response.json();
            
            if (res.status === "success") {
                if (type === 'card') {
                    document.getElementById('id_card').value = res.data.id || "";
                    document.getElementById('full_name').value = res.data.name || "";
                } else {
                    document.getElementById('car_plate').value = res.data.plate || "";
                    document.getElementById('province').value = res.data.province || "";
                }
                Swal.fire({ icon: 'success', title: 'AI อ่านข้อมูลสำเร็จ', timer: 1000, showConfirmButton: false });
            } else {
                Swal.fire('แจ้งเตือน', 'AI อ่านไม่ออก: ' + (res.message || 'กรุณาลองใหม่'), 'warning');
            }
        } catch (e) {
            console.error("OCR Error:", e);
            Swal.fire('Error', 'การส่งข้อมูลขัดข้อง (เน็ตอาจช้าหรือไฟล์ใหญ่เกินไป)', 'error');
        } finally {
            loader.style.display = 'none';
        }
    }
}

  async function processOCR(base64, type) {
      loader.style.display = 'flex';
      try {
        const response = await fetch(SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'ocr', image: base64, type: type })
        });
        
        const res = await response.json();
        
        if (res.status === "success") {
          if (type === 'card') {
            document.getElementById('id_card').value = res.data.id || "";
            document.getElementById('full_name').value = res.data.name || "";
          } else if (type === 'plate') {
            document.getElementById('car_plate').value = res.data.plate || "";
            document.getElementById('province').value = res.data.province || "";
          }
          Swal.fire({ icon: 'success', title: 'AI อ่านข้อมูลสำเร็จ', timer: 1000, showConfirmButton: false });
        } else {
          Swal.fire('แจ้งเตือน', 'AI อ่านข้อมูลไม่สำเร็จ กรุณาถ่ายใหม่', 'warning');
        }
      } catch (e) { 
        console.error("OCR Error:", e);
        Swal.fire('Error', 'ไม่สามารถเชื่อมต่อ AI ได้', 'error');
      } finally { 
        loader.style.display = 'none'; 
      }
    }

    // --- Voice Recognition (ดึงกลับมา) ---
    function startVoiceRecognition(targetId) {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) return Swal.fire('Error', 'เบราว์เซอร์ไม่รองรับการพิมพ์ด้วยเสียง', 'error');
      
      const recognition = new SpeechRecognition();
      recognition.lang = 'th-TH';
      recognition.onresult = (e) => {
        document.getElementById(targetId).value = e.results[0][0].transcript;
      };
      recognition.start();
      Swal.fire({ title: 'กำลังฟังเสียง...', timer: 2000, showConfirmButton: false });
    }

    // --- Barcode Scanner ---
    async function startBarcodeScanner(id) {
      const modal = new bootstrap.Modal(document.getElementById('barcodeModal'));
      modal.show();
      setTimeout(async () => {
        html5QrCode = new Html5Qrcode("reader");
        await html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, (text) => {
          document.getElementById(id).value = text;
          stopBarcodeScanner();
          modal.hide();
          Swal.fire({ icon: 'success', title: 'สแกนสำเร็จ', timer: 600, showConfirmButton: false });
        });
      }, 500);
    }

    async function stopBarcodeScanner() {
      if (html5QrCode?.isScanning) await html5QrCode.stop();
    }

    // --- Member List Logic ---
  function addMemberToList() {
      const id_card = document.getElementById('id_card').value;
      const full_name = document.getElementById('full_name').value;
      const badge_id = document.getElementById('badge_id').value;
      
      // ✅ แก้ไข: อ้างอิง ID ของภาพที่เราสร้างขึ้นในขั้นตอน Capture
      const personImgObj = document.getElementById('img-src-person');
      const cardImgObj = document.getElementById('img-src-card');
      
      const person_img = personImgObj ? personImgObj.src : '';
      const card_img = cardImgObj ? cardImgObj.src : '';

      if(!id_card || !badge_id || !person_img) {
          return Swal.fire('ข้อมูลไม่ครบ', 'ต้องมีรูปคน, เลขบัตร และบาร์โค้ด', 'warning');
      }

      tempMembers.push({ 
          id_card, 
          full_name, 
          badge_id, 
          person_img, 
          card_img 
      });
      
      renderTable();

      // ล้างค่า
      ['id_card','full_name','badge_id'].forEach(id => document.getElementById(id).value = '');
      resetPreviewBox('box-person', '<i class="fa-solid fa-user-camera fa-2x text-muted"></i><span class="small mt-1 text-muted">รูปคน</span>');
      resetPreviewBox('box-card', '<i class="fa-solid fa-id-card fa-2x text-muted"></i><span class="small mt-1 text-muted">สแกนบัตร</span>');
    }

    function renderTable() {
      const listBody = document.getElementById('memberList');
      if (tempMembers.length === 0) {
          listBody.innerHTML = '<tr><td colspan="3" class="text-center text-muted py-3">ไม่มีรายชื่อรอนำเข้า</td></tr>';
          document.getElementById('member-count').innerText = "0 คน";
          return;
      }

      listBody.innerHTML = tempMembers.map((m, i) => `
        <tr class="align-middle">
          <td width="60">
            <img src="${m.person_img}" class="rounded border shadow-sm" width="50" height="50" style="object-fit:cover;">
          </td>
          <td>
            <div class="fw-bold text-dark">${m.full_name || 'ไม่ทราบชื่อ'}</div>
            <div class="text-muted" style="font-size: 0.75rem;">
               <i class="fa-solid fa-id-card-clip me-1"></i>${m.id_card} | <i class="fa-solid fa-barcode me-1"></i>${m.badge_id}
            </div>
          </td>
          <td class="text-end">
            <button class="btn btn-outline-danger btn-sm border-0" onclick="tempMembers.splice(${i},1);renderTable()">
              <i class="fa-solid fa-trash-can"></i>
            </button>
          </td>
        </tr>`).join('');
      
      document.getElementById('member-count').innerText = tempMembers.length + " คน";
    }

    function resetPreviewBox(boxId, html) {
      const box = document.getElementById(boxId);
      box.classList.remove('has-image');
      box.innerHTML = html;
    }

    // --- Final Save ---
    async function saveAllToSheet() {
      if (tempMembers.length === 0) return Swal.fire('แจ้งเตือน', 'กรุณาเพิ่มสมาชิกอย่างน้อย 1 คน', 'warning');
      if (!document.getElementById('car_plate').value) return Swal.fire('แจ้งเตือน', 'กรุณาสแกนทะเบียนรถ', 'warning');

      Swal.fire({ title: 'กำลังบันทึกข้อมูล...', text: 'กรุณารอสักครู่', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

      const payload = {
        action: 'save',
        vst_id: document.getElementById('vst_id').value,
        contact_area: document.querySelector('input[name="contact_area"]:checked').value,
        contact_topic: document.getElementById('contact_topic').value,
        contact_person: document.getElementById('contact_person').value,
        car_plate: document.getElementById('car_plate').value,
        province: document.getElementById('province').value,
        barcode_car: document.getElementById('barcode_car').value,
        plate_img: document.querySelector('#box-plate img')?.src || '',
        members: tempMembers
      };

      try {
        const response = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
        const res = await response.json();
        if (res.status === "success") {
          await Swal.fire('สำเร็จ', 'บันทึกข้อมูลทั้งหมดเรียบร้อยแล้ว', 'success');
          location.reload();
        } else { throw new Error(res.message); }
      } catch (e) { Swal.fire('Error', 'บันทึกไม่สำเร็จ: ' + e.message, 'error'); }
    }

    window.onload = async () => {
      try {
        const res = await fetch(SCRIPT_URL + "?action=getNextId").then(r => r.json());
        document.getElementById('vst_id').value = res.id;
        document.getElementById('vst_display').innerText = res.id;
      } catch (e) { document.getElementById('vst_display').innerText = "VST-Error"; }
    };
  </script>
</body>
</html>
