<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ระบบบันทึกข้อมูลผู้ติดต่อ (Optimized)</title>
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
  
  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    :root {
      --primary-color: #0d6efd;
      --dark-color: #212529;
    }

    body {
      font-family: 'Sarabun', sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
      padding-bottom: 50px;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      margin-bottom: 20px;
    }

    /* กล่องพรีวิวรูปภาพ */
    .preview-box {
      width: 100%;
      aspect-ratio: 1 / 1;
      border: 2px dashed #ccc;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      overflow: hidden;
      position: relative;
      transition: all 0.3s ease;
      background: #fff;
    }

    .preview-box.has-image {
      border-style: solid;
      border-color: #28a745;
    }

    .preview-box img {
      width: 100%;
      height: 100%;
      object-fit: cover; /* บังคับรูปเต็มกล่องไม่เบี้ยว */
    }

    .preview-label-overlay {
      position: absolute;
      bottom: 0;
      width: 100%;
      background: rgba(0, 0, 0, 0.6);
      color: white;
      font-size: 10px;
      padding: 2px 0;
      text-align: center;
    }

    .loading-overlay {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(255, 255, 255, 0.9); z-index: 9999;
      flex-direction: column; justify-content: center; align-items: center;
      backdrop-filter: blur(5px);
    }

    #video-container {
      max-width: 500px;
      width: 100%;
    }
  </style>
</head>

<body>

  <div class="loading-overlay" id="loader">
    <div class="spinner-grow text-primary" style="width: 3rem; height: 3rem;"></div>
    <div class="mt-3 fw-bold text-primary">ระบบกำลังประมวลผล AI...</div>
  </div>

  <div class="container py-4" style="max-width: 700px;">

    <div class="text-center mb-4">
      <i class="fa-solid fa-shield-halved fa-3x text-primary mb-2"></i>
      <h2 class="fw-bold">ระบบบันทึกผู้ติดต่อ</h2>
      <div id="vst_display" class="badge bg-primary fs-5 px-4 rounded-pill">VST-LOADING</div>
    </div>

    <div class="card glass-card border-0">
      <div class="card-body p-3 text-center">
        <div id="video-container" class="position-relative mb-3 mx-auto">
          <div class="ratio ratio-16x9 border rounded overflow-hidden shadow-sm bg-dark">
            <video id="video" autoplay playsinline style="object-fit: cover; width: 100%; height: 100%;"></video>
          </div>
          <button class="btn btn-light btn-sm position-absolute top-0 end-0 m-2 rounded-circle shadow-sm" onclick="switchCamera()" style="z-index: 10;">
            <i class="fa-solid fa-camera-rotate p-1"></i>
          </button>
        </div>

        <div class="row g-2">
          <div class="col-4">
            <div class="preview-box" id="box-person" onclick="capture('person')">
              <i class="fa-solid fa-user-camera fa-2x text-muted"></i>
              <span class="small mt-1 text-muted">รูปคน</span>
            </div>
          </div>
          <div class="col-4">
            <div class="preview-box" id="box-card" onclick="capture('card')">
              <i class="fa-solid fa-id-card fa-2x text-muted"></i>
              <span class="small mt-1 text-muted">สแกนบัตร</span>
            </div>
          </div>
          <div class="col-4">
            <div class="preview-box" id="box-plate" onclick="capture('plate')">
              <i class="fa-solid fa-car-side fa-2x text-muted"></i>
              <span class="small mt-1 text-muted">ทะเบียน</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="card glass-card border-0 px-3 py-4">
      <h5 class="fw-bold text-primary mb-3"><i class="fa-solid fa-pen-to-square me-2"></i>ข้อมูลผู้ติดต่อ</h5>
      
      <div class="row g-3">
        <input type="hidden" id="vst_id">
        <div class="col-md-6">
          <label class="form-label small fw-bold">เลขบัตรประชาชน</label>
          <input type="text" id="id_card" class="form-control" placeholder="รอสแกน...">
        </div>
        <div class="col-md-6">
          <label class="form-label small fw-bold">ชื่อ-นามสกุล</label>
          <input type="text" id="full_name" class="form-control" placeholder="รอสแกน...">
        </div>
        <div class="col-7">
          <label class="form-label small fw-bold">ทะเบียนรถ</label>
          <input type="text" id="car_plate" class="form-control" placeholder="รอสแกน...">
        </div>
        <div class="col-5">
          <label class="form-label small fw-bold">จังหวัด</label>
          <input type="text" id="province" class="form-control" placeholder="...">
        </div>
        <div class="col-12">
          <label class="form-label small fw-bold text-danger">สแกนบาร์โค้ดบัตรติดคน</label>
          <div class="input-group">
            <input type="text" id="badge_id" class="form-control border-danger">
            <button class="btn btn-danger" onclick="startBarcodeScanner()">
              <i class="fa-solid fa-barcode"></i>
            </button>
          </div>
        </div>
      </div>
      
      <div id="barcode-scanner-container" style="display:none;" class="mt-2 text-center">
        <div id="reader"></div>
        <button class="btn btn-sm btn-secondary mt-2 w-100" onclick="stopBarcodeScanner()">ปิดสแกนเนอร์</button>
      </div>

      <button class="btn btn-warning w-100 mt-4 py-3 fw-bold shadow-sm" onclick="addMemberToList()">
        <i class="fa-solid fa-user-plus me-2"></i>เพิ่มเข้ารายการกลุ่ม
      </button>
    </div>

    <div class="card glass-card border-0 overflow-hidden">
      <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
        <span class="fw-bold small">รายชื่อรอนำเข้า</span>
        <span id="member-count" class="badge bg-primary">0 คน</span>
      </div>
      <div class="table-responsive">
        <table class="table table-hover mb-0">
          <tbody id="memberList" class="small"></tbody>
        </table>
      </div>
    </div>

    <button class="btn btn-primary btn-lg w-100 py-3 shadow" onclick="saveAllToSheet()">
      <i class="fa-solid fa-cloud-arrow-up me-2"></i>บันทึกข้อมูลทั้งหมด
    </button>

  </div>

  <canvas id="canvas" style="display:none;"></canvas>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxfaP2fnkaWO4w-Pe_fleqYX3AZ4EqtEF0oyEktKXLAiq7tkKHkiheDUgDNYDhV3hbs/exec"; 

    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const loader = document.getElementById('loader');
    let tempMembers = [];
    let html5QrCode;
    let currentStream = null;
    let facingMode = "environment";

    async function startCamera() {
        if (currentStream) currentStream.getTracks().forEach(t => t.stop());
        try {
            currentStream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: facingMode, width: { ideal: 1280 }, height: { ideal: 720 } } 
            });
            video.srcObject = currentStream;
        } catch (err) { 
            Swal.fire('กล้องผิดพลาด', 'กรุณาอนุญาตให้ใช้กล้อง', 'error'); 
        }
    }

async function capture(type) {
    const ctx = canvas.getContext('2d');
    const vWidth = video.videoWidth;
    const vHeight = video.videoHeight;

    if (type === 'plate') {
        // --- ส่วนพิเศษสำหรับทะเบียนรถ ---
        // ตัดภาพเฉพาะกึ่งกลาง (60% ของความกว้างและสูง) เพื่อให้ทะเบียนตัวใหญ่ขึ้น
        const cropW = vWidth * 0.6; 
        const cropH = vHeight * 0.4; // ป้ายทะเบียนเป็นแนวนอน เลยตัดให้เตี้ยลงได้
        const startX = (vWidth - cropW) / 2;
        const startY = (vHeight - cropH) / 2;

        canvas.width = cropW;
        canvas.height = cropH;

        // วาดเฉพาะส่วนที่ตัด (Crop)
        ctx.drawImage(video, startX, startY, cropW, cropH, 0, 0, cropW, cropH);
    } else {
        // สำหรับรูปคนและบัตรประชาชน (ใช้ขนาดเต็มเหมือนเดิมที่เคยอ่านได้)
        canvas.width = vWidth;
        canvas.height = vHeight;
        ctx.drawImage(video, 0, 0, vWidth, vHeight);
    }

    const base64 = canvas.toDataURL('image/jpeg', 0.95);
    
    // แสดงรูปใน Preview Box
    const box = document.getElementById('box-' + type);
    box.classList.add('has-image');
    box.innerHTML = `<img src="${base64}"><div class="preview-label-overlay">${type === 'person' ? 'รูปคน' : (type === 'card' ? 'บัตร' : 'ทะเบียน')}</div>`;

    if (type === 'card' || type === 'plate') {
        loader.style.display = 'flex';
        try {
            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'cors',
                body: JSON.stringify({ action: 'ocr', image: base64, type: type })
            });
            const res = await response.json();
            
            if (res.status === "success") {
                if (type === 'card') {
                    document.getElementById('id_card').value = res.data.id || "";
                    document.getElementById('full_name').value = res.data.name || "";
                } else {
                    // ถ้ายังอ่านไม่ได้ ให้ลองดูว่า AI คืนค่าอะไรมา
                    document.getElementById('car_plate').value = res.data.plate || "";
                    document.getElementById('province').value = res.data.province || "";
                }
                Swal.fire({ icon: 'success', title: 'AI สแกนสำเร็จ', timer: 1000, showConfirmButton: false });
            }
        } catch (e) {
            Swal.fire('OCR Error', 'ติดต่อ AI ไม่ได้', 'warning');
        } finally {
            loader.style.display = 'none';
        }
    }
}

    function startBarcodeScanner() {
        document.getElementById('barcode-scanner-container').style.display = 'block';
        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
            document.getElementById('badge_id').value = text;
            stopBarcodeScanner();
        }).catch(err => console.error(err));
    }

    function stopBarcodeScanner() {
        if (html5QrCode) {
            html5QrCode.stop().then(() => {
                document.getElementById('barcode-scanner-container').style.display = 'none';
            });
        }
    }

   function addMemberToList() {
    const id_card = document.getElementById('id_card').value;
    const full_name = document.getElementById('full_name').value;
    const badge_id = document.getElementById('badge_id').value;
    const person_img = document.querySelector('#box-person img')?.src || '';

    // ตรวจสอบข้อมูลจำเป็น
    if(!id_card || !badge_id) {
        return Swal.fire('ข้อมูลไม่ครบ','กรุณาระบุเลขบัตรและสแกนบัตรติดคน','warning');
    }

    // เพิ่มข้อมูลลงใน Array รายการกลุ่ม
    tempMembers.push({ id_card, full_name, badge_id, person_img });
    
    // อัปเดตตารางแสดงผล
    renderTable();

    // --- 1. เคลียร์ข้อมูลใน Input ---
    ['id_card','full_name','badge_id'].forEach(id => document.getElementById(id).value = '');

    // --- 2. เคลียร์รูปภาพ Preview (Reset กลับเป็น Icon เดิม) ---
    resetPreviewBox('box-person', '<i class="fa-solid fa-user-camera fa-2x text-muted"></i><span class="small mt-1 text-muted">รูปคน</span>');
    resetPreviewBox('box-card', '<i class="fa-solid fa-id-card fa-2x text-muted"></i><span class="small mt-1 text-muted">สแกนบัตร</span>');

    Swal.fire({
        icon: 'success',
        title: 'เพิ่มรายชื่อสำเร็จ',
        text: 'คุณสามารถสแกนคนถัดไปได้ทันที',
        timer: 1000,
        showConfirmButton: false
    });
}

// ฟังก์ชันเสริมสำหรับล้างค่ากล่องพรีวิว
function resetPreviewBox(boxId, defaultHtml) {
    const box = document.getElementById(boxId);
    box.classList.remove('has-image');
    box.innerHTML = defaultHtml;
}

    function renderTable() {
        const listBody = document.getElementById('memberList');
        listBody.innerHTML = tempMembers.map((m, i) => `
            <tr>
                <td width="50"><img src="${m.person_img}" class="rounded shadow-sm" width="40" height="40" style="object-fit:cover;"></td>
                <td><b>${m.full_name || 'ไม่ได้ระบุชื่อ'}</b><br><small class="text-muted">${m.id_card}</small></td>
                <td class="text-end">
                    <button class="btn btn-sm text-danger" onclick="tempMembers.splice(${i},1);renderTable()"><i class="fa-solid fa-trash"></i></button>
                </td>
            </tr>`).join('');
        document.getElementById('member-count').innerText = tempMembers.length + " คน";
    }

    async function saveAllToSheet() {
        if (tempMembers.length === 0) return Swal.fire('ไม่มีข้อมูล','กรุณาเพิ่มรายชื่อก่อนบันทึก','info');
        Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
        const payload = {
            action: 'save',
            vst_id: document.getElementById('vst_id').value,
            car_plate: document.getElementById('car_plate').value,
            province: document.getElementById('province').value,
            members: tempMembers
        };
        try {
            const response = await fetch(SCRIPT_URL, { method: 'POST', mode: 'cors', body: JSON.stringify(payload) });
            const res = await response.json();
            if(res.status === "success") {
                Swal.fire('สำเร็จ', 'บันทึกเรียบร้อย', 'success').then(() => location.reload());
            }
        } catch (e) { Swal.fire('Error', 'บันทึกไม่สำเร็จ', 'error'); }
    }

    window.onload = () => {
        startCamera();
        fetch(SCRIPT_URL + "?action=getNextId").then(r => r.json()).then(res => {
            document.getElementById('vst_id').value = res.id;
            document.getElementById('vst_display').innerText = res.id;
        });
    };
</script>
</body>
</html>
