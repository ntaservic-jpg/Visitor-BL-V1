<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ระบบบันทึกข้อมูลผู้ติดต่อ (Optimized)</title>
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
  
  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <style>
    :root {
      --primary-color: #0d6efd;
      --dark-color: #212529;
    }

    body {
      font-family: 'Sarabun', sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
      padding-bottom: 50px;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      margin-bottom: 20px;
    }

    /* กล่องพรีวิวรูปภาพ */
    .preview-box {
      width: 100%;
      aspect-ratio: 1 / 1;
      border: 2px dashed #ccc;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      overflow: hidden;
      position: relative;
      transition: all 0.3s ease;
      background: #fff;
    }

    .preview-box.has-image {
      border-style: solid;
      border-color: #28a745;
    }

    .preview-box img {
      width: 100%;
      height: 100%;
      object-fit: cover; /* บังคับรูปเต็มกล่องไม่เบี้ยว */
    }

    .preview-label-overlay {
      position: absolute;
      bottom: 0;
      width: 100%;
      background: rgba(0, 0, 0, 0.6);
      color: white;
      font-size: 10px;
      padding: 2px 0;
      text-align: center;
    }

    .loading-overlay {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(255, 255, 255, 0.9); z-index: 9999;
      flex-direction: column; justify-content: center; align-items: center;
      backdrop-filter: blur(5px);
    }

    #video-container {
      max-width: 500px;
      width: 100%;
    }
  </style>
</head>

<body>

  <div class="loading-overlay" id="loader">
    <div class="spinner-grow text-primary" style="width: 3rem; height: 3rem;"></div>
    <div class="mt-3 fw-bold text-primary">ระบบกำลังประมวลผล AI...</div>
  </div>

  <div class="container py-4" style="max-width: 700px;">

    <div class="text-center mb-4">
      <i class="fa-solid fa-shield-halved fa-3x text-primary mb-2"></i>
      <h2 class="fw-bold">ระบบบันทึกผู้ติดต่อ</h2>
      <div id="vst_display" class="badge bg-primary fs-5 px-4 rounded-pill">VST-LOADING</div>
    </div>

    <div class="card glass-card border-0">
  <div class="card-body p-3 text-center">
    <div class="row g-2">
      <div class="col-4">
        <div class="preview-box" id="box-person" onclick="openCaptureModal('person')">
          <i class="fa-solid fa-user-camera fa-2x text-muted"></i>
          <span class="small mt-1 text-muted">รูปคน</span>
        </div>
      </div>
      <div class="col-4">
        <div class="preview-box" id="box-card" onclick="openCaptureModal('card')">
          <i class="fa-solid fa-id-card fa-2x text-muted"></i>
          <span class="small mt-1 text-muted">สแกนบัตร</span>
        </div>
      </div>
      <div class="col-4">
        <div class="preview-box" id="box-plate" onclick="openCaptureModal('plate')">
          <i class="fa-solid fa-car-side fa-2x text-muted"></i>
          <span class="small mt-1 text-muted">ทะเบียน</span>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="cameraModal" data-bs-backdrop="static" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow-lg" style="border-radius: 20px; overflow: hidden;">
      <div class="modal-header bg-dark text-white border-0">
        <h6 class="modal-title fw-bold" id="cameraModalTitle">ถ่ายรูป</h6>
        <button type="button" class="btn-close btn-close-white" onclick="closeCameraModal()"></button>
      </div>
      <div class="modal-body p-0 bg-black position-relative">
        <video id="video" autoplay playsinline style="width: 100%; display: block;"></video>
        <button class="btn btn-light btn-sm position-absolute top-0 end-0 m-2 rounded-circle shadow-sm" onclick="switchCamera()">
          <i class="fa-solid fa-camera-rotate"></i>
        </button>
      </div>
      <div class="modal-footer bg-light border-0">
        <button type="button" class="btn btn-primary w-100 py-2 fw-bold" id="captureBtn">
          <i class="fa-solid fa-camera me-2"></i>กดถ่ายรูป
        </button>
      </div>
    </div>
  </div>
</div>

    <div class="card glass-card border-0 px-3 py-4">
      <h5 class="fw-bold text-primary mb-3"><i class="fa-solid fa-pen-to-square me-2"></i>บันทึกข้อมูล</h5>
      
      <div class="row g-3">
        <input type="hidden" id="vst_id">
        
        <div class="col-12 p-3 rounded-3 mt-3" style="background-color: #fff5f5; border-left: 5px solid #dc3545;">
          <small class="fw-bold text-danger d-block mb-2"><i class="fa-solid fa-user me-1"></i> ส่วนที่ 1: ข้อมูลบุคคล (เพิ่มทีละคน)</small>
          <div class="row g-2">
            <div class="col-md-6">
              <label class="form-label small fw-bold">เลขบัตรประชาชน</label>
              <input type="text" id="id_card" class="form-control" placeholder="รอสแกนบัตร...">
            </div>
            <div class="col-md-6">
              <label class="form-label small fw-bold">ชื่อ-นามสกุล</label>
              <input type="text" id="full_name" class="form-control" placeholder="รอสแกนชื่อ...">
            </div>
            <div class="col-12">
              <label class="form-label small fw-bold text-danger">บาร์โค้ดบัตรติดคน</label>
              <div class="input-group shadow-sm">
                <input type="text" id="badge_id" class="form-control border-danger" placeholder="สแกนบาร์โค้ดคน...">
                <button class="btn btn-danger" onclick="startBarcodeScanner('badge_id')">
                  <i class="fa-solid fa-barcode"></i>
                </button>
              </div>
            </div>
          </div>
        </div>

            <div class="col-12 p-3 rounded-3" style="background-color: #f0f7ff; border-left: 5px solid #0d6efd;">
  <small class="fw-bold text-primary d-block mb-2"><i class="fa-solid fa-car me-1"></i> ส่วนที่ 2: ข้อมูลการติดต่อและพาหนะ</small>
  
  <div class="row g-2">
    <div class="col-12 mb-2">
      <label class="form-label small fw-bold">พื้นที่ติดต่อ</label>
      <div class="d-flex gap-2">
        <input type="radio" class="btn-check" name="contact_area" id="area_normal" value="พื้นที่ธรรมดา" checked>
        <label class="btn btn-outline-primary w-100 btn-sm" for="area_normal">พื้นที่ธรรมดา</label>

        <input type="radio" class="btn-check" name="contact_area" id="area_red" value="พื้นที่สีแดง">
        <label class="btn btn-outline-danger w-100 btn-sm" for="area_red">พื้นที่สีแดง</label>
      </div>
    </div>

    <div class="col-12 mb-2">
  <label class="form-label small fw-bold"><i class="fa-solid fa-comment-dots me-1 text-secondary"></i>ติดต่อเรื่อง</label>
  <div class="input-group shadow-sm">
    <input type="text" id="contact_topic" class="form-control" placeholder="พูดหรือพิมพ์เรื่องติดต่อ...">
    <button class="btn btn-primary px-3" type="button" onclick="startVoiceRecognition('contact_topic')">
      <i class="fa-solid fa-microphone"></i>
    </button>
  </div>
</div>

<div class="col-12 mb-2">
  <label class="form-label small fw-bold"><i class="fa-solid fa-user-tie me-1 text-secondary"></i>ติดต่อใคร</label>
  <div class="input-group shadow-sm">
    <input type="text" id="contact_person" class="form-control" placeholder="พูดหรือพิมพ์ชื่อบุคคล/แผนก...">
    <button class="btn btn-primary px-3" type="button" onclick="startVoiceRecognition('contact_person')">
      <i class="fa-solid fa-microphone"></i>
    </button>
  </div>
</div>

    <hr class="my-2 opacity-25">

    <div class="col-12 mb-2">
  <label class="form-label small fw-bold">
    <i class="fa-solid fa-car-rear me-1 text-primary"></i>ทะเบียนรถ
  </label>
  <input type="text" id="car_plate" class="form-control" placeholder="รอสแกนป้ายทะเบียน...">
</div>

<div class="col-12 mb-2">
  <label class="form-label small fw-bold">
    <i class="fa-solid fa-map-location-dot me-1 text-primary"></i>จังหวัด
  </label>
  <input type="text" id="province" class="form-control" placeholder="จังหวัดบนป้ายทะเบียน...">
</div>
    
    <div class="col-12">
      <label class="form-label small fw-bold text-primary">บาร์โค้ดบัตรติดรถ</label>
      <div class="input-group input-group-sm shadow-sm">
        <input type="text" id="barcode_car" class="form-control border-primary" placeholder="สแกนบาร์โค้ดรถ...">
        <button class="btn btn-primary" onclick="startBarcodeScanner('barcode_car')">
          <i class="fa-solid fa-barcode"></i>
        </button>
      </div>
    </div>
  </div>
</div>
        
      </div>
      
      <button class="btn btn-warning w-100 mt-4 py-3 fw-bold shadow-sm" onclick="addMemberToList()">
        <i class="fa-solid fa-user-plus me-2"></i>เพิ่มเข้ารายการกลุ่ม
      </button>

      <div class="modal fade" id="barcodeModal" data-bs-backdrop="static" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow-lg" style="border-radius: 20px; overflow: hidden;">
      <div class="modal-header bg-dark text-white border-0">
        <h6 class="modal-title fw-bold"><i class="fa-solid fa-barcode me-2"></i>กำลังสแกนบาร์โค้ด...</h6>
        <button type="button" class="btn-close btn-close-white" onclick="stopBarcodeScanner()"></button>
      </div>
      <div class="modal-body p-0 bg-black">
        <div id="reader" style="width: 100%;"></div>
      </div>
      <div class="modal-footer bg-light border-0">
        <button type="button" class="btn btn-secondary w-100 fw-bold" onclick="stopBarcodeScanner()">ปิดหน้าต่างสแกน</button>
      </div>
    </div>
  </div>
</div>
    </div>

    <div class="card glass-card border-0 overflow-hidden">
      <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
        <span class="fw-bold small">รายชื่อรอนำเข้า</span>
        <span id="member-count" class="badge bg-primary">0 คน</span>
      </div>
      <div class="table-responsive">
        <table class="table table-hover mb-0">
          <tbody id="memberList" class="small"></tbody>
        </table>
      </div>
    </div>

    <button class="btn btn-primary btn-lg w-100 py-3 shadow" onclick="saveAllToSheet()">
      <i class="fa-solid fa-cloud-arrow-up me-2"></i>บันทึกข้อมูลทั้งหมด
    </button>

  </div>

  <canvas id="canvas" style="display:none;"></canvas>

<script>
    // ใช้ URL ล่าสุดที่คุณส่งมา
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxfaP2fnkaWO4w-Pe_fleqYX3AZ4EqtEF0oyEktKXLAiq7tkKHkiheDUgDNYDhV3hbs/exec"; 

    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const loader = document.getElementById('loader');
    let tempMembers = [];
    let html5QrCode;
    let currentStream = null;
    let facingMode = "environment";
    let cameraModal;
    let currentType = ''; 

    // --- 1. ระบบจัดการกล้อง (รักษาฟังก์ชัน Modal เดิม) ---
    async function startCamera() {
        if (currentStream) {
            currentStream.getTracks().forEach(t => t.stop());
        }
        try {
            currentStream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: facingMode, width: { ideal: 1280 }, height: { ideal: 720 } } 
            });
            video.srcObject = currentStream;
        } catch (err) { 
            Swal.fire('กล้องผิดพลาด', 'กรุณาอนุญาตให้เข้าถึงกล้อง', 'error'); 
        }
    }

    async function openCaptureModal(type) {
        currentType = type;
        const titles = { 'person': 'ถ่ายรูปบุคคล', 'card': 'สแกนบัตรประชาชน', 'plate': 'สแกนป้ายทะเบียน' };
        document.getElementById('cameraModalTitle').innerText = titles[type];

        document.getElementById('captureBtn').onclick = async () => {
            await capture(currentType);
            closeCameraModal();
        };

        if (!cameraModal) {
            cameraModal = new bootstrap.Modal(document.getElementById('cameraModal'));
        }
        
        cameraModal.show();
        await startCamera();
    }

    function closeCameraModal() {
        if (cameraModal) cameraModal.hide();
        if (currentStream) {
            currentStream.getTracks().forEach(track => track.stop());
            video.srcObject = null;
        }
    }

    async function switchCamera() {
        facingMode = (facingMode === "user") ? "environment" : "user";
        loader.style.display = 'flex';
        await startCamera();
        setTimeout(() => { loader.style.display = 'none'; }, 500);
    }

    // --- 2. ระบบ Capture และ OCR (คงฟังก์ชันเดิมแต่ปรับความเสถียร) ---
    async function capture(type) {
        const ctx = canvas.getContext('2d');
        const vWidth = video.videoWidth;
        const vHeight = video.videoHeight;

        if (type === 'plate') {
            const cropW = vWidth * 0.8; 
            const cropH = vHeight * 0.5;
            const startX = (vWidth - cropW) / 2;
            const startY = (vHeight - cropH) / 2;
            canvas.width = cropW;
            canvas.height = cropH;
            ctx.drawImage(video, startX, startY, cropW, cropH, 0, 0, cropW, cropH);
        } else {
            canvas.width = vWidth;
            canvas.height = vHeight;
            ctx.drawImage(video, 0, 0, vWidth, vHeight);
        }

        const base64 = canvas.toDataURL('image/jpeg', 0.85);
        const box = document.getElementById('box-' + type);
        box.classList.add('has-image');
        box.innerHTML = `<img src="${base64}"><div class="preview-label-overlay">${type === 'person' ? 'รูปคน' : (type === 'card' ? 'บัตร' : 'ทะเบียน')}</div>`;

        if (type === 'card' || type === 'plate') {
            loader.style.display = 'flex';
            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'ocr', image: base64, type: type })
                });
                const res = await response.json();
                if (res.status === "success") {
                    if (type === 'card') {
                        document.getElementById('id_card').value = res.data.id || "";
                        document.getElementById('full_name').value = res.data.name || "";
                    } else {
                        document.getElementById('car_plate').value = res.data.plate || "";
                        document.getElementById('province').value = res.data.province || "";
                    }
                    Swal.fire({ icon: 'success', title: 'AI สแกนสำเร็จ', timer: 800, showConfirmButton: false });
                }
            } catch (e) {
                console.error(e);
            } finally {
                loader.style.display = 'none';
            }
        }
    }

    // --- 3. ระบบ Barcode และ Voice Recognition (ห้ามหาย) ---
    let barcodeModal;
    async function startBarcodeScanner(targetId) {
        if (!barcodeModal) barcodeModal = new bootstrap.Modal(document.getElementById('barcodeModal'));
        barcodeModal.show();
        setTimeout(async () => {
            try {
                if (html5QrCode) await html5QrCode.clear();
                html5QrCode = new Html5Qrcode("reader");
                await html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, 
                (text) => {
                    document.getElementById(targetId).value = text;
                    stopBarcodeScanner();
                    Swal.fire({ icon: 'success', title: 'สแกนสำเร็จ', timer: 700, showConfirmButton: false });
                });
            } catch (err) { stopBarcodeScanner(); }
        }, 500);
    }

    async function stopBarcodeScanner() {
        if (html5QrCode && html5QrCode.isScanning) await html5QrCode.stop();
        if (barcodeModal) barcodeModal.hide();
    }

    function startVoiceRecognition(targetId) {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) return Swal.fire('Error', 'ไม่รองรับระบบเสียง', 'error');
        
        const recognition = new SpeechRecognition();
        recognition.lang = 'th-TH';
        recognition.onresult = (e) => {
            document.getElementById(targetId).value = e.results[0][0].transcript;
        };
        recognition.start();
        Swal.fire({ title: 'กำลังฟังเสียง...', timer: 2000, showConfirmButton: false });
    }

    // --- 4. ฟังก์ชันการจัดการกลุ่ม (หัวใจสำคัญ) ---
    function addMemberToList() {
        const id_card = document.getElementById('id_card').value;
        const full_name = document.getElementById('full_name').value;
        const badge_id = document.getElementById('badge_id').value;
        const person_img = document.querySelector('#box-person img')?.src || '';
        
        if(!id_card || !badge_id) return Swal.fire('ข้อมูลไม่ครบ','ระบุเลขบัตรและสแกนบัตรติดคน','warning');
        
        tempMembers.push({ id_card, full_name, badge_id, person_img });
        renderTable();
        
        // ล้างเฉพาะข้อมูลคน เพื่อเพิ่มคนต่อไป
        ['id_card','full_name','badge_id'].forEach(id => document.getElementById(id).value = '');
        resetPreviewBox('box-person', '<i class="fa-solid fa-user-camera fa-2x text-muted"></i><span class="small mt-1 text-muted">รูปคน</span>');
        resetPreviewBox('box-card', '<i class="fa-solid fa-id-card fa-2x text-muted"></i><span class="small mt-1 text-muted">สแกนบัตร</span>');
    }

    function renderTable() {
        const listBody = document.getElementById('memberList');
        listBody.innerHTML = tempMembers.map((m, i) => `
            <tr>
                <td width="50"><img src="${m.person_img}" class="rounded" width="40" height="40" style="object-fit:cover;"></td>
                <td><b>${m.full_name || 'ไม่ทราบชื่อ'}</b><br><small>${m.id_card}</small></td>
                <td class="text-end"><button class="btn btn-sm text-danger" onclick="tempMembers.splice(${i},1);renderTable()"><i class="fa-solid fa-trash"></i></button></td>
            </tr>`).join('');
        document.getElementById('member-count').innerText = tempMembers.length + " คน";
    }

    function resetPreviewBox(boxId, defaultHtml) {
        const box = document.getElementById(boxId);
        box.classList.remove('has-image');
        box.innerHTML = defaultHtml;
    }

    // --- 5. บันทึกทั้งหมดลง Google Sheets ---
    async function saveAllToSheet() {
        if (tempMembers.length === 0) return Swal.fire('แจ้งเตือน', 'เพิ่มสมาชิกอย่างน้อย 1 คน', 'warning');
        if (!document.getElementById('car_plate').value) return Swal.fire('แจ้งเตือน', 'กรุณาสแกนทะเบียนรถ', 'warning');

        Swal.fire({ title: 'กำลังบันทึกข้อมูล...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

        const payload = {
            action: 'save',
            vst_id: document.getElementById('vst_id').value,
            contact_area: document.querySelector('input[name="contact_area"]:checked').value,
            contact_topic: document.getElementById('contact_topic').value,
            contact_person: document.getElementById('contact_person').value,
            car_plate: document.getElementById('car_plate').value,
            province: document.getElementById('province').value,
            barcode_car: document.getElementById('barcode_car').value,
            plate_img: document.querySelector('#box-plate img')?.src || '',
            card_img: document.querySelector('#box-card img')?.src || '',
            members: tempMembers 
        };

        try {
            const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) }).then(r => r.json());
            if (res.status === "success") {
                await Swal.fire({ icon: 'success', title: 'บันทึกสำเร็จ', text: 'เลขที่อ้างอิง: ' + payload.vst_id });
                location.reload();
            }
        } catch (e) {
            Swal.fire('Error', 'บันทึกไม่สำเร็จ', 'error');
        }
    }

    // --- 6. ดึง ID เริ่มต้น (ทำเพียงครั้งเดียวเมื่อโหลดหน้า) ---
    window.onload = async () => {
        try {
            const res = await fetch(SCRIPT_URL + "?action=getNextId").then(r => r.json());
            document.getElementById('vst_id').value = res.id;
            document.getElementById('vst_display').innerText = res.id;
        } catch (e) {
            document.getElementById('vst_display').innerText = "VST-Error";
        }
    };
</script>
</body>
</html>
