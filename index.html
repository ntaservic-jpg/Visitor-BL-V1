<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ระบบบันทึกข้อมูลผู้ติดต่อ (GitHub Version)</title>
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
  
  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    :root {
      --primary-color: #0d6efd;
      --dark-color: #212529;
    }

    body {
      font-family: 'Sarabun', sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
      padding-bottom: 50px;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      margin-bottom: 20px;
    }

    #video {
      width: 100%;
      border-radius: 15px;
      background: #000;
      transform: scaleX(1); /* แก้ไขกรณีกล้องกลับด้าน */
    }

    .preview-box {
      width: 100%;
      height: 120px;
      border: 2px dashed #dee2e6;
      border-radius: 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #fff;
      overflow: hidden;
      position: relative;
      cursor: pointer;
    }

    .preview-box img { width: 100%; height: 100%; object-fit: cover; }

    .preview-label {
      position: absolute; bottom: 0; width: 100%;
      background: rgba(13, 110, 253, 0.8);
      color: white; font-size: 10px; padding: 2px 0; text-align: center;
    }

    .loading-overlay {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(255, 255, 255, 0.9); z-index: 9999;
      flex-direction: column; justify-content: center; align-items: center;
      backdrop-filter: blur(5px);
    }
    
    #reader { border-radius: 15px; margin-top: 10px; }
  </style>
</head>

<body>

  <div class="loading-overlay" id="loader">
    <div class="spinner-grow text-primary" style="width: 3rem; height: 3rem;"></div>
    <div class="mt-3 fw-bold text-primary">ระบบกำลังประมวลผล AI...</div>
  </div>

  <div class="container py-4" style="max-width: 700px;">

    <div class="text-center mb-4">
      <i class="fa-solid fa-shield-halved fa-3x text-primary mb-2"></i>
      <h2 class="fw-bold">ระบบบันทึกผู้ติดต่อ</h2>
      <div id="vst_display" class="badge bg-primary fs-5 px-4 rounded-pill">VST-LOADING</div>
    </div>

    <div class="card glass-card border-0">
      <div class="card-body p-3">
        <div class="position-relative mb-3">
          <video id="video" autoplay playsinline></video>
          <button class="btn btn-light btn-sm position-absolute top-0 end-0 m-2 rounded-circle shadow-sm" onclick="switchCamera()">
            <i class="fa-solid fa-camera-rotate p-1"></i>
          </button>
        </div>

        <div class="row g-2">
          <div class="col-4">
            <div class="preview-box" id="box-person" onclick="capture('person')">
              <i class="fa-solid fa-user-camera fa-2x text-muted"></i>
              <div class="preview-label">ถ่ายรูปคน</div>
            </div>
          </div>
          <div class="col-4">
            <div class="preview-box" id="box-card" onclick="capture('card')">
              <i class="fa-solid fa-id-card fa-2x text-muted"></i>
              <div class="preview-label">สแกนบัตร</div>
            </div>
          </div>
          <div class="col-4">
            <div class="preview-box" id="box-plate" onclick="capture('plate')">
              <i class="fa-solid fa-car-side fa-2x text-muted"></i>
              <div class="preview-label">สแกนทะเบียน</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="card glass-card border-0 px-3 py-4">
      <h5 class="fw-bold text-primary mb-3"><i class="fa-solid fa-pen-to-square me-2"></i>ข้อมูลผู้ติดต่อ</h5>
      
      <div class="row g-3">
        <input type="hidden" id="vst_id">
        <div class="col-md-6">
          <label class="form-label small fw-bold">เลขบัตรประชาชน</label>
          <input type="text" id="id_card" class="form-control" placeholder="รอกล้องอ่านค่า...">
        </div>
        <div class="col-md-6">
          <label class="form-label small fw-bold">ชื่อ-นามสกุล</label>
          <input type="text" id="full_name" class="form-control" placeholder="รอกล้องอ่านค่า...">
        </div>
        <div class="col-7">
          <label class="form-label small fw-bold">ทะเบียนรถ</label>
          <input type="text" id="car_plate" class="form-control">
        </div>
        <div class="col-5">
          <label class="form-label small fw-bold">จังหวัด</label>
          <input type="text" id="province" class="form-control">
        </div>
        <div class="col-12">
          <label class="form-label small fw-bold text-danger">สแกนบาร์โค้ดบัตรติดคน</label>
          <div class="input-group">
            <input type="text" id="badge_id" class="form-control border-danger">
            <button class="btn btn-danger" onclick="startBarcodeScanner()">
              <i class="fa-solid fa-barcode"></i>
            </button>
          </div>
        </div>
      </div>
      
      <div id="barcode-scanner-container" style="display:none;" class="mt-2 text-center">
        <div id="reader"></div>
        <button class="btn btn-sm btn-secondary mt-2 w-100" onclick="stopBarcodeScanner()">ปิดสแกนเนอร์</button>
      </div>

      <button class="btn btn-warning w-100 mt-4 py-3 fw-bold shadow-sm" onclick="addMemberToList()">
        <i class="fa-solid fa-user-plus me-2"></i>เพิ่มเข้ารายการกลุ่ม
      </button>
    </div>

    <div class="card glass-card border-0 overflow-hidden">
      <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
        <span class="fw-bold small">รายชื่อที่รอนำเข้า</span>
        <span id="member-count" class="badge bg-primary">0 คน</span>
      </div>
      <div class="table-responsive">
        <table class="table table-hover mb-0">
          <tbody id="memberList" class="small"></tbody>
        </table>
      </div>
    </div>

    <button class="btn btn-primary btn-lg w-100 py-3 shadow" onclick="saveAllToSheet()">
      <i class="fa-solid fa-cloud-arrow-up me-2"></i>บันทึกลงฐานข้อมูล Google
    </button>

  </div>

  <canvas id="canvas" style="display:none;"></canvas>

<script>
    // ตรวจสอบ URL ให้ถูกต้อง (Web App URL จาก Google Apps Script)
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbypSahvhwdI0zi5ICjjO_cHYCtL2XVgaMxTBLP3sOcjsXowgyGUluNcqwQYZJ1wu1C7ig/exec"; 

    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const loader = document.getElementById('loader');
    let tempMembers = [];
    let html5QrCode;
    let currentStream = null;
    let facingMode = "environment";

    // 1. ระบบกล้อง
    async function startCamera() {
        if (currentStream) currentStream.getTracks().forEach(t => t.stop());
        try {
            currentStream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: facingMode, width: { ideal: 1280 }, height: { ideal: 720 } } 
            });
            video.srcObject = currentStream;
        } catch (err) { 
            console.error(err);
            Swal.fire('กล้องผิดพลาด', 'ไม่สามารถเข้าถึงกล้องได้', 'error'); 
        }
    }

    function switchCamera() {
        facingMode = (facingMode === "user") ? "environment" : "user";
        startCamera();
    }

    // 2. ระบบ AI OCR (สแกนบัตร/ทะเบียน)
    async function capture(type) {
        const ctx = canvas.getContext('2d');
        // ใช้ความละเอียดสูงเพื่อให้ AI อ่านง่ายขึ้น
        canvas.width = 1280; 
        canvas.height = 720;
        ctx.drawImage(video, 0, 0, 1280, 720);
        const base64 = canvas.toDataURL('image/jpeg', 0.8);

        // แสดงรูปพรีวิวทันที
        document.getElementById('box-' + type).innerHTML = `<img src="${base64}"><div class="preview-label">${type}</div>`;

        // ถ้าเป็นประเภทที่ต้องใช้ OCR
        if (type === 'card' || type === 'plate') {
            loader.style.display = 'flex';
            
            try {
                // ส่งข้อมูลไปยัง Google Apps Script
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'cors', // ต้องใช้ cors เพื่อรับค่า JSON กลับมา
                    cache: 'no-cache',
                    body: JSON.stringify({ action: 'ocr', image: base64, type: type })
                });

                const res = await response.json();

                if (res.status === "success") {
                    if (type === 'card') {
                        document.getElementById('id_card').value = res.data.id || "";
                        document.getElementById('full_name').value = res.data.name || "";
                    } else if (type === 'plate') {
                        document.getElementById('car_plate').value = res.data.plate || "";
                        document.getElementById('province').value = res.data.province || "";
                    }
                    Swal.fire({ icon: 'success', title: 'ประมวลผลสำเร็จ', timer: 1500, showConfirmButton: false });
                } else {
                    throw new Error(res.message || 'AI อ่านค่าไม่ได้');
                }
            } catch (e) { 
                console.error("OCR Error:", e);
                Swal.fire('ประมวลผลไม่สำเร็จ', 'AI อ่านค่าไม่ได้หรือการเชื่อมต่อมีปัญหา', 'warning');
            } finally {
                loader.style.display = 'none';
            }
        }
    }

    // 3. ระบบ Barcode
    function startBarcodeScanner() {
        document.getElementById('barcode-scanner-container').style.display = 'block';
        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, 
        (text) => {
            document.getElementById('badge_id').value = text;
            stopBarcodeScanner();
        }).catch(err => console.error(err));
    }

    function stopBarcodeScanner() {
        if (html5QrCode) {
            html5QrCode.stop().then(() => {
                document.getElementById('barcode-scanner-container').style.display = 'none';
            });
        }
    }

    // 4. ระบบจัดการรายชื่อกลุ่ม
    function addMemberToList() {
        const id_card = document.getElementById('id_card').value;
        const full_name = document.getElementById('full_name').value;
        const badge_id = document.getElementById('badge_id').value;
        const person_img = document.querySelector('#box-person img')?.src || '';

        if(!id_card || !badge_id) {
            return Swal.fire('ข้อมูลไม่ครบ','กรุณาระบุเลขบัตรและสแกนบาร์โค้ด','warning');
        }

        tempMembers.push({ id_card, full_name, badge_id, person_img });
        renderTable();
        
        // ล้างช่องกรอก (ยกเว้นรูปถ่ายคนเผื่อใช้ซ้ำ หรือจะล้างก็ได้)
        ['id_card','full_name','badge_id'].forEach(id => document.getElementById(id).value = '');
    }

    function renderTable() {
        const listBody = document.getElementById('memberList');
        listBody.innerHTML = tempMembers.map((m, i) => `
            <tr>
                <td><img src="${m.person_img || 'https://via.placeholder.com/35'}" class="rounded-circle" width="35" height="35"></td>
                <td><b>${m.full_name || 'ไม่ทราบชื่อ'}</b><br><small>${m.id_card}</small></td>
                <td class="text-end">
                    <button class="btn btn-sm text-danger" onclick="tempMembers.splice(${i},1);renderTable()">
                        <i class="fa-solid fa-trash"></i>
                    </button>
                </td>
            </tr>`).join('');
        document.getElementById('member-count').innerText = tempMembers.length + " คน";
    }

    // 5. บันทึกลง Google Sheets
    async function saveAllToSheet() {
        if (tempMembers.length === 0) return Swal.fire('ไม่มีข้อมูล','กรุณาเพิ่มรายชื่ออย่างน้อย 1 คน','info');
        
        Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

        const payload = {
            action: 'save',
            vst_id: document.getElementById('vst_id').value,
            car_plate: document.getElementById('car_plate').value,
            province: document.getElementById('province').value,
            members: tempMembers
        };

        try {
            const response = await fetch(SCRIPT_URL, { 
                method: 'POST', 
                mode: 'cors',
                body: JSON.stringify(payload) 
            });
            const res = await response.json();
            if(res.status === "success") {
                Swal.fire('สำเร็จ', 'บันทึกข้อมูลเรียบร้อยแล้ว', 'success').then(() => location.reload());
            } else {
                throw new Error(res.message);
            }
        } catch (e) { 
            console.error(e);
            Swal.fire('Error', 'ไม่สามารถบันทึกได้ กรุณาลองใหม่', 'error'); 
        }
    }

    // เริ่มต้นเมื่อโหลดหน้า
    window.onload = () => {
        startCamera();
        // ดึง VST ID ถัดไป
        fetch(SCRIPT_URL + "?action=getNextId")
            .then(r => r.json())
            .then(res => {
                const id = res.id || res; 
                document.getElementById('vst_id').value = id;
                document.getElementById('vst_display').innerText = id;
            })
            .catch(err => {
                console.error(err);
                document.getElementById('vst_display').innerText = "VST-ERR";
            });
    };
</script>
</body>
</html>
